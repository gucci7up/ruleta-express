version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ruleta_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ruleta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ruleta_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ruleta_express}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ruleta_net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ruleta}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ruleta_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - ruleta_net
    healthcheck:
      test: ['CMD', 'redis-cli', '--no-auth-warning', '-a', '${REDIS_PASSWORD:-redis_secret}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ruleta_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@ruleta.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - '5050:80'
    networks:
      - ruleta_net
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:

networks:
  ruleta_net:
    driver: bridge
