version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ruleta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ruleta_express}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ruleta}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ruleta}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ruleta_express}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PORT: 3000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3

  pos:
    build:
      context: .
      dockerfile: apps/pos/Dockerfile
    restart: unless-stopped
    # These env vars are injected at container startup by docker-entrypoint.sh
    environment:
      VITE_API_URL: ${API_URL:-http://localhost:3000}
      VITE_SOCKET_URL: ${API_URL:-http://localhost:3000}
      VITE_TICKET_BASE_URL: ${POS_URL:-http://localhost:4001}

  display:
    build:
      context: .
      dockerfile: apps/display/Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_URL: ${API_URL:-http://localhost:3000}
      VITE_SOCKET_URL: ${API_URL:-http://localhost:3000}
      VITE_BRANCH_ID: ${BRANCH_ID:-1}

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_URL: ${API_URL:-http://localhost:3000}

volumes:
  postgres_data:
  redis_data:
